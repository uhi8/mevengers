[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.26"
via_ir = true
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
unichain_sepolia = "${UNICHAIN_SEPOLIA_RPC_URL}"
unichain = "${UNICHAIN_RPC_URL}"
reactive = "${REACTIVE_RPC_URL}"

[etherscan]
unichain_sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.uniscan.xyz/api" }

[profile.default.fuzz]
runs = 1000
